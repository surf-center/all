<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surfcenter — Overzicht</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: #f8fafc;
    background-image:
      radial-gradient(at 20% 0%, rgba(225, 29, 72, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
    min-height: 100vh;
    color: #0f172a;
    padding: 80px 24px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 64px;
  }

  .logo {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .logo:hover {
    transform: scale(1.04);
  }

  .logo img {
    height: 110px;
    width: auto;
    display: block;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    padding: 30px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 180px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
  }

  .card:hover::before {
    transform: scaleX(1);
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: var(--accent-bg);
  }

  .card-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #0f172a;
  }

  .card-desc {
    font-size: 14px;
    color: #64748b;
    line-height: 1.5;
    flex-grow: 1;
  }

  .card-arrow {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-top: auto;
  }

  .card:hover .card-arrow svg {
    transform: translateX(4px);
  }

  .card-arrow svg {
    transition: transform 0.3s;
  }

  /* per-card colors */
  .card.calculator { --accent: #f59e0b; --accent-bg: #fef3c7; }
  .card.balance    { --accent: #059669; --accent-bg: #d1fae5; }
  .card.tracking   { --accent: #2563eb; --accent-bg: #dbeafe; }
  .card.sales      { --accent: #db2777; --accent-bg: #fce7f3; }
  .card.dashboard  { --accent: #7c3aed; --accent-bg: #ede9fe; }

  @media (max-width: 600px) {
    body { padding: 48px 16px; }
    .logo img { height: 80px; }
    .card { padding: 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <a href="https://surf-center.com" class="logo" target="_blank" rel="noopener">
      <img src="logo.png" alt="Surfcenter">
    </a>
  </header>

  <div class="grid">

    <a href="https://surf-center.github.io/calculator/" class="card calculator" target="_blank" rel="noopener">
      <div class="card-icon">🔢</div>
      <div class="card-title">Calculator</div>
      <div class="card-desc">Bereken prijzen, marges en offertes</div>
      <div class="card-arrow">
        Open
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="https://surf-center.github.io/my-balance/" class="card balance" target="_blank" rel="noopener">
      <div class="card-icon">💰</div>
      <div class="card-title">My Balance</div>
      <div class="card-desc">Bekijk je saldo en financiële overzicht</div>
      <div class="card-arrow">
        Open
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="https://surf-center.github.io/tracking/" class="card tracking" target="_blank" rel="noopener">
      <div class="card-icon">📦</div>
      <div class="card-title">Tracking</div>
      <div class="card-desc">Volg activiteiten en voortgang</div>
      <div class="card-arrow">
        Open
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="https://surf-center.github.io/sales/" class="card sales" target="_blank" rel="noopener">
      <div class="card-icon">🏷️</div>
      <div class="card-title">Sales</div>
      <div class="card-desc">Verkoopcijfers en omzet inzichten</div>
      <div class="card-arrow">
        Open
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="https://surf-center.github.io/dashboard/" class="card dashboard" target="_blank" rel="noopener">
      <div class="card-icon">📊</div>
      <div class="card-title">Dashboard</div>
      <div class="card-desc">Compleet overzicht van alle KPI's</div>
      <div class="card-arrow">
        Open
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

  </div>

</div>
</body>
</html>
